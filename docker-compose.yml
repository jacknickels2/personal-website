version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    env_file:
      - .env
    volumes:
      # Mount static files for easy updates without rebuild
      - ./static:/app/static:ro
      - ./templates:/app/templates:ro
    networks:
      - web
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  web:
    name: web
    external: false
