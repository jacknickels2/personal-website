<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nicholas Cox - Software Engineer & Data Scientist Portfolio">
    <meta name="author" content="Nicholas Cox">
    <title>{% block page_title %}{{ title }}{% endblock %} - Nicholas Cox</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">Nicholas Cox</a>
            <ul class="nav-links">
                <li><a href="/" {% if title == "Home" %}class="active"{% endif %}>Home</a></li>
                <li><a href="/about" {% if title == "About" %}class="active"{% endif %}>About</a></li>
                <li><a href="/projects" {% if title == "Projects" %}class="active"{% endif %}>Projects</a></li>
                <li><a href="/contact" {% if title == "Contact" %}class="active"{% endif %}>Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ year|default(2026) }} Nicholas Cox. All rights reserved.</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
